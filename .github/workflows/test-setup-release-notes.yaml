name: test-release-notes-action

on:
  pull_request:
    branches:
      - 'main'
  push:
    branches:
      - 'main'

permissions: {}

jobs:
  changes:
    runs-on: ubuntu-latest

    permissions:
      pull-requests: read
      contents: read

    outputs:
      relnotes: ${{ steps.filter.outputs.relnotes }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: dorny/paths-filter@9d7afb8d214ad99e78fbd4247752c4caed2b6e4c # v4.0.0
        id: filter
        with:
          filters: |
            relnotes:
              - 'setup-release-notes/**'
              - '.github/workflows/test-setup-release-notes.yaml'

  test_relnotes_action:
    if: ${{ needs.changes.outputs.relnotes == 'true' }}
    needs:
      - changes

    strategy:
      matrix:
        os:
          - macos-latest
          - ubuntu-latest

    runs-on: ${{ matrix.os }}

    permissions:
      contents: read

    name: Install release-notes and test presence in path
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install release notes
        uses: ./setup-release-notes

      - name: Check install!
        run: release-notes --help

      - name: Check root directory
        run: |
          if [[ $(git diff --stat) != '' ]]; then
            echo 'should be clean'
            exit 1
          else
            exit 0
          fi
        shell: bash

  test_relnotes_with_go_install:
    if: ${{ needs.changes.outputs.relnotes == 'true' }}
    needs:
      - changes

    strategy:
      matrix:
        os:
          - macos-latest
          - ubuntu-latest

    runs-on: ${{ matrix.os }}

    permissions:
      contents: read

    name: Try to install release-notes with go 1.25
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version: '1.25'
          check-latest: true
          cache: false

      - name: Install release-notes
        uses: ./setup-release-notes

      - name: Check install!
        run: release-notes --help
